services:
  backend:
    image: "registry.gitlab.com/wedeving/autoconcierge-www/backend:{{ docker_tag }}"
    volumes:
      - "static:/static"
      - "media:/media"
    environment:
      # django settings
      ALLOWED_HOSTS: "{{domain}},backend"
      SECRET_KEY: ""
      DEBUG_MODE: true
      BASE_URL: "https://{{ domain }}"
      MEDIA_ROOT: /media
      STATIC_ROOT: /static
      CORS_ALLOW_ALL_ORIGINS: false
      CORS_ALLOWED_ORIGINS: "http://{{ domain }},https://{{ domain }}"
      CSRF_TRUSTED_ORIGINS: "http://{{ domain }},https://{{ domain }}"

      # database
      DB_NAME: "{{ db_name }}"
      DB_USER: "{{ db_user }}"
      DB_PASSWORD: "{{ db_password }}"
      DB_HOST: postgres
      DB_PORT: 5432

    healthcheck:
      test: ["CMD", "sh", "-c", "ss -nltp | grep '0.0.0.0:8000'"]
      interval: 5s
      timeout: 1s
      retries: 10
      start_period: 1s

    networks:
      autoconcierge:
        ipv4_address: "{{ docker_network_prefix }}.10"

    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: "registry.gitlab.com/wedeving/autoconcierge-www/frontend:{{ docker_tag }}"
    environment:
      NEXT_PUBLIC_API_URL: https://{{ domain }}/api/v1
    networks:
      autoconcierge:
        ipv4_address: "{{ docker_network_prefix }}.11"
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - "postgres:/var/lib/postgresql/data"
    environment:
      - POSTGRES_USER={{ db_user }}
      - POSTGRES_PASSWORD={{ db_password }}
      - POSTGRES_DB={{ db_name }}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    networks:
      autoconcierge:
        ipv4_address: "{{ docker_network_prefix }}.20"

networks:
  autoconcierge:
    name: "{{ app }}_network"
    ipam:
      config:
        - subnet: "{{ docker_network_prefix }}.0/24"

volumes:
  media:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: "/var/{{ app }}/media"
  static:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: "/var/{{ app }}/static"
  redis:
  postgres:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: "/var/{{ app }}/postgres"
