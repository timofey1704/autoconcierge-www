- name: Autoconcierge service
  hosts: servers
  tasks:
    - name: Docker compose project dir
      ansible.builtin.file:
        path: "/etc/docker/compose/{{ app }}"
        state: directory
        mode: "0755"

    - name: App data dir
      ansible.builtin.file:
        path: "/var/{{ app }}"
        state: directory
        mode: "0755"

    - name: Postgres dir
      ansible.builtin.file:
        path: "/var/{{ app }}/postgres"
        state: directory
        mode: "0755"

    - name: Static dir
      ansible.builtin.file:
        path: "/var/{{ app }}/static"
        state: directory
        mode: "0755"

    - name: Media dir
      ansible.builtin.file:
        path: "/var/{{ app }}/media"
        state: directory
        mode: "0755"

    - name: Log into gitlab registry
      become: true
      become_user: "{{ user }}"
      community.docker.docker_login:
        registry_url: registry.gitlab.com
        username: "{{ registry_user }}"
        password: "{{ registry_token }}"
        reauthorize: true

    - name: Docker compose file
      ansible.builtin.template:
        src: "autoconcierge/docker-compose.yml"
        dest: "/etc/docker/compose/{{ app }}/docker-compose.yml"
        mode: "0644"
      notify: Restart compose service

    - name: Pull backend image
      become: true
      become_user: "{{ user }}"
      community.docker.docker_image_pull:
        name: registry.gitlab.com/wedeving/autoconcierge-www/backend:{{ docker_tag }}
        pull: always
      notify:
        - Restart app
        - Prune docker

    - name: Pull frontend image
      become: true
      become_user: "{{ user }}"
      community.docker.docker_image_pull:
        name: registry.gitlab.com/wedeving/autoconcierge-www/frontend:{{ docker_tag }}
        pull: always
      notify:
        - Restart app
        - Prune docker

    - name: Systemd service
      ansible.builtin.systemd:
        name: "compose@{{ app }}"
        state: started
        daemon_reload: true
        enabled: true

    - name: Configure frontend
      ansible.builtin.template:
        src: autoconcierge/frontend.conf
        dest: "/etc/angie/http.d/frontend.conf"
        mode: "0644"
      notify: Restart angie

  handlers:
    - name: Restart compose service
      ansible.builtin.service:
        name: "compose@{{ app }}"
        state: restarted

    - name: Restart app
      community.docker.docker_compose_v2:
        project_src: "/etc/docker/compose/{{ app }}"
        state: restarted
        services:
          - backend
          - frontend

    - name: Prune docker
      community.docker.docker_prune:
        containers: true
        images: true
        networks: true
        volumes: true
        builder_cache: true

    - name: Restart angie
      ansible.builtin.service:
        name: angie
        state: restarted
